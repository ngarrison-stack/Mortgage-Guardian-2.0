services:
  backend:
    build: ./backend-express
    ports:
      - "3000:3000"
    env_file: backend-express/.env
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Mortgage Guardian}
        - NEXT_PUBLIC_ENABLE_PLAID=${NEXT_PUBLIC_ENABLE_PLAID:-false}
        - NEXT_PUBLIC_ENABLE_AI_ANALYSIS=${NEXT_PUBLIC_ENABLE_AI_ANALYSIS:-false}
    ports:
      - "3001:3001"
    env_file: frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional: only needed if backend uses Redis for caching/rate-limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
