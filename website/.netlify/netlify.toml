headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[functions]

[functions."*"]

[build]
publish = "/Users/nickgarrison/Documents/GitHub/Mortgage-Guardian-2.0-Clean/Mortgage-Guardian-2.0/website"
publishOrigin = "config"
commandOrigin = "config"
base = "/Users/nickgarrison/Documents/GitHub/Mortgage-Guardian-2.0-Clean/Mortgage-Guardian-2.0/website"
command = "echo 'No build required - static site'"

[build.environment]
NODE_VERSION = "20"
SITE_URL = "https://mortgageguardian.org"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
for = "/css/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/js/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.html"

[headers.values]
Cache-Control = "public, max-age=3600"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]