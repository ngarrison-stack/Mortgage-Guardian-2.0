AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  PlaidClientID:
    Type: String
    Description: Plaid Client ID for bank integrations
  PlaidSecret:
    Type: String
    NoEcho: true
    Description: Plaid Secret for bank integrations

Resources:
  # API Gateway - Public access with rate limiting
  MortgageGuardianAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        ApiKeyRequired: false  # No API key required - public access
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          ThrottlingRateLimit: 10    # 10 requests per second per IP
          ThrottlingBurstLimit: 20    # Burst of 20 requests
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization'"
        AllowOrigin: "'*'"

  # Claude Analysis Function with storage access and Bedrock permissions
  ClaudeAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/claude-analysis/
      Handler: index.handler
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DOCUMENT_BUCKET: !Ref DocumentStorageBucket
          DOCUMENT_TABLE: !Ref DocumentMetadataTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentStorageBucket
        - S3WritePolicy:
            BucketName: !Ref DocumentStorageBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentMetadataTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - "bedrock:InvokeModel"
                - "bedrock:InvokeModelWithResponseStream"
              Resource:
                - "arn:aws:bedrock:*::foundation-model/anthropic.claude-*"
      Events:
        AnalyzeDocument:
          Type: Api
          Properties:
            RestApiId: !Ref MortgageGuardianAPI
            Path: /v1/ai/claude/analyze
            Method: post

  # Document Storage Function
  DocumentStorageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/document-storage/
      Handler: index.handler
      Runtime: nodejs18.x
      Environment:
        Variables:
          DOCUMENT_BUCKET: !Ref DocumentStorageBucket
          DOCUMENT_TABLE: !Ref DocumentMetadataTable
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentStorageBucket
        - S3WritePolicy:
            BucketName: !Ref DocumentStorageBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentMetadataTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
      Events:
        UploadDocument:
          Type: Api
          Properties:
            RestApiId: !Ref MortgageGuardianAPI
            Path: /v1/documents/upload
            Method: post
        GetDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref MortgageGuardianAPI
            Path: /v1/documents
            Method: get
        GetDocument:
          Type: Api
          Properties:
            RestApiId: !Ref MortgageGuardianAPI
            Path: /v1/documents/{documentId}
            Method: get
        DeleteDocument:
          Type: Api
          Properties:
            RestApiId: !Ref MortgageGuardianAPI
            Path: /v1/documents/{documentId}
            Method: delete

  # Plaid Integration Function
  PlaidFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/plaid/
      Handler: index.handler
      Runtime: nodejs18.x
      Environment:
        Variables:
          PLAID_CLIENT_ID: !Ref PlaidClientID
          PLAID_SECRET: !Ref PlaidSecret
      Events:
        PlaidLink:
          Type: Api
          Properties:
            RestApiId: !Ref MortgageGuardianAPI
            Path: /v1/plaid/{proxy+}
            Method: ANY

  # S3 Bucket for secure document storage
  DocumentStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "mortgage-guardian-documents-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AutoDeleteAfter30Days
            Status: Enabled
            ExpirationInDays: 30
          - Id: DeleteIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      VersioningConfiguration:
        Status: Enabled

  # DynamoDB for document metadata and user data
  UserDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MortgageGuardianUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # DynamoDB for document metadata and analysis results
  DocumentMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MortgageGuardianDocuments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
        - AttributeName: uploadDate
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: documentId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserUploadDateIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: uploadDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${MortgageGuardianAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/"
